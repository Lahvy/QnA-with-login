    /* ===== Particles background ===== */
#particles-bg{
  position: fixed;
  inset: 0;
  z-index: 0;

  overflow: hidden;
}

#particles-canvas{
  width: 100%;
  height: 100%;
  display: block;
}

/* Obsah musí být nad backgroundem */
.wrap{
  position: relative;
  z-index: 1;
}
    
    :root{
      /* Komerční banka palette (from publicly listed brand colors) */
      --kb-red: #000000;   /* primary accent */ /* [1](https://brandfetch.com/kb.cz) */
      --kb-black: #020203; /* primary text */   /* [1](https://brandfetch.com/kb.cz) */
      --kb-gray: #97A6B6;  /* secondary */      /* [1](https://brandfetch.com/kb.cz) */

      --bg: #F6F7F9;
      --card: #ffffff;
      --muted: #5B6470;
      --border: rgba(2,2,3,0.12);
      --shadow: 0 10px 30px rgba(2,2,3,0.10);
      --radius: 18px;
      --radius-sm: 12px;

      --focus: 0 0 0 4px rgba(224,0,0,0.18);
      --tap: 48px;
      --max: 1080px;
    }

    *{ box-sizing: border-box; }
    html, body{ height: 100%; }
  body{
  margin: 0;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;

}
    a{ color: inherit; }

    .actions{

      gap: 10px;

      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--kb-black);
      display: inline-flex;
      gap: 10px;
      align-items: center;

      font-weight: 650;
      font-size: 14px;

      user-select: none;
    }
    .btn:hover{
      border-color: rgba(2,2,3,0.18);
      box-shadow: 0 10px 22px rgba(2,2,3,0.08);
      transform: translateY(-1px);
    }

    /* Ikonové tlačítko (Nastavení) */
.btn.iconOnly{

  height: 42px;
  padding: 0;           /* žádný vnitřní padding */
  border-radius: 14px;
  justify-content: center;
  gap: 0;               /* žádná mezera pro text */
}

/* Ikona uvnitř – velikost a zarovnání */
.btn.iconOnly svg{
  width: 20px;
  height: 20px;
}

/* Volitelné: jemně ztlumit barvu ikony v klidu */

  color: var(--kb-black);
}

/* Volitelné: lepší feedback na hover (lehce zvýraznit) */
.btn.iconOnly:hover{
  background: rgba(255,255,255,0.92);
}


    
    .btn.primary{

      color: white;

/* ===== Settings dropdown menu ===== */

}

/* menu panel */

/* otevřený stav */

.menuItem:focus-visible{

/* ikony v menu */

/**********************
 * Firestore realtime: načítání dotazů pro všechny
 **********************/


function startRealtimeQuestions(){
  // zruš předchozí listener (když přepínáš session)
  if (typeof state._unsubQuestions === "function") {
    state._unsubQuestions();
    state._unsubQuestions = null;
  }

  if (!state.sessionId) {
    state.questions = [];
    render();
    return;
  }

  const q = db.collection(QUESTIONS_COLLECTION)
    .where("sessionId", "==", state.sessionId)
    .orderBy("createdAt", "desc");

  state._unsubQuestions = q.onSnapshot((snapshot) => {
    state.questions = snapshot.docs.map(doc => {
      const d = doc.data() || {};
      const ts = d.createdAt;
      const createdAt =
        ts && typeof ts.toMillis === "function" ? ts.toMillis()
        : (typeof ts === "number" ? ts : Date.now());

      return {
        id: doc.id,
        text: d.text || "",
        name: d.name || "anonymně",
        likes: typeof d.likes === "number" ? d.likes : 0,
        createdAt,
        sessionId: d.sessionId
      };
    });

    render();
  }, (err) => {
    console.error("❌ Firestore listener error:", err);
    toast("Firestore: chyba čtení (rules nebo index) ❌");
  });
}

/**********************
 * Likes (Firestore realtime)
 **********************/
async function likeQuestion(id){
  const alreadyLiked = !!state.likedMap[id];

  try {
    // pokud už byl like, tak ho odebereme (-1), jinak přidáme (+1)
    const delta = alreadyLiked ? -1 : 1;

    // (volitelné) lokální ochrana proti záporným likes v UI
    const q = state.questions.find(x => x.id === id);
    if (alreadyLiked && q && q.likes <= 0) {
      // už je 0 → nemá smysl odečítat
      delete state.likedMap[id];
      saveLikes();
      render();
      return;
    }

    // Firestore: atomický increment o +1 / -1
    await db.collection(QUESTIONS_COLLECTION).doc(id).update({
      likes: firebase.firestore.FieldValue.increment(delta)
    });

    // Lokální toggle stav
    if (alreadyLiked) {
      delete state.likedMap[id];
      toast("Like odebrán 💔");
    } else {
      state.likedMap[id] = true;
      toast("Like přidán ❤️");
    }
    saveLikes();

    // Okamžitý repaint (realtime listener to stejně dorovná)
    render();

  } catch (e) {
    console.error("❌ Firestore like toggle error:", e);
    toast("Nepodařilo se změnit like (pravděpodobně rules) ❌");
  }
}

async function deleteAllQuestionsInSession(sessionId){
  const col = db.collection(QUESTIONS_COLLECTION);
  let totalDeleted = 0;

  while (true) {
    const snap = await col
      .where("sessionId", "==", sessionId)
      .limit(500)
      .get();

    if (snap.empty) break;

    const batch = db.batch();
    snap.docs.forEach(doc => batch.delete(doc.ref));
    await batch.commit();

    totalDeleted += snap.size;
    if (snap.size < 500) break;
  }

  return totalDeleted;
}

async function createSession(name){

    name: name.trim(),

    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });

async function getSession(sessionId){
  const doc = await db.collection(SESSIONS_COLLECTION).doc(sessionId).get();
  if (!doc.exists) return null;
  const data = doc.data() || {};
  return { id: doc.id, ...data };
}

/** nastaví aktivní session (state + localStorage + URL + restart listeneru) */
async function setActiveSession(sessionId){
  state.sessionId = sessionId;
  localStorage.setItem(SESSION_KEY, sessionId);
  writeSessionToUrl(sessionId);

  const s = await getSession(sessionId);
  state.sessionName = s?.name || null;
  setSessionLabel();

  // likes jsou per-session
  try {
    state.likedMap = JSON.parse(localStorage.getItem(likesStorageKey()) || "{}") || {};
  } catch {
    state.likedMap = {};
  }

  // restart realtime listeneru dotazů pro session
  startRealtimeQuestions();

  // refresh QR + UI
  renderQr();
  render();
}

/** zajistí že nějaká session existuje a je aktivní */
async function ensureSession(){
  // 1) URL param má prioritu (účastnický link/QR)
  const fromUrl = readSessionFromUrl();
  if (fromUrl) {
    await setActiveSession(fromUrl);
    return;
  }

  // 2) LocalStorage
  const fromStorage = localStorage.getItem(SESSION_KEY);
  if (fromStorage) {
    await setActiveSession(fromStorage);
    return;
  }

  // 3) Pokud není nic, zkus použít poslední existující nebo vytvoř první
  const sessions = await listSessions();
  if (sessions.length) {
    await setActiveSession(sessions[0].id);
    return;
  }

  const created = await createSession("Session 1");
  await setActiveSession(created.id);
}


/**********************
 * Particles background (vanilla JS)
 * Inspired by React particles.tsx
 **********************/
function initParticlesBackground() {
  const container = document.getElementById("particles-bg");
  const canvas = document.getElementById("particles-canvas");
  if (!container || !canvas) return;

  const ctx = canvas.getContext("2d");
  if (!ctx) return;

  const dpr = window.devicePixelRatio || 1;

  const config = {
    quantity: 90,
    staticity: 55,
    ease: 70,
    size: 1.1,
    color: "#3D000D",   // jemná šedo-modrá z tvé palety
    vx: 0.015,
    vy: 0.01
  };

  let circles = [];
  let mouse = { x: 0, y: 0 };
  let canvasSize = { w: 0, h: 0 };
  let animationId = null;

  function hexToRgb(hex) {
    hex = (hex || "").replace("#", "");
    if (hex.length === 3) {
      hex = hex.split("").map(ch => ch + ch).join("");
    }
    const hexInt = parseInt(hex, 16);
    return [
      (hexInt >> 16) & 255,
      (hexInt >> 8) & 255,
      hexInt & 255
    ];
  }

  const rgb = hexToRgb(config.color);

  function resizeCanvas() {
    canvasSize.w = window.innerWidth;
    canvasSize.h = window.innerHeight;

    canvas.width = Math.floor(canvasSize.w * dpr);
    canvas.height = Math.floor(canvasSize.h * dpr);

    canvas.style.width = canvasSize.w + "px";
    canvas.style.height = canvasSize.h + "px";

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);

    circles = [];
    drawParticles();
  }

  function circleParams() {
    const x = Math.random() * canvasSize.w;
    const y = Math.random() * canvasSize.h;
    const pSize = Math.random() * 1.8 + config.size;
    const targetAlpha = Math.random() * 0.35 + 0.08;

    return {
      x,
      y,
      translateX: 0,
      translateY: 0,
      size: pSize,
      alpha: 0,
      targetAlpha,
      dx: (Math.random() - 0.5) * 0.12,
      dy: (Math.random() - 0.5) * 0.12,
      magnetism: 0.2 + Math.random() * 3.5
    };
  }

  function clearContext() {
    ctx.clearRect(0, 0, canvasSize.w, canvasSize.h);
  }

  function drawCircle(circle, push = false) {
    ctx.save();
    ctx.translate(circle.translateX, circle.translateY);
    ctx.beginPath();
    ctx.arc(circle.x, circle.y, circle.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${circle.alpha})`;
    ctx.fill();
    ctx.restore();

    if (push) circles.push(circle);
  }

  function drawParticles() {
    clearContext();
    for (let i = 0; i < config.quantity; i++) {
      drawCircle(circleParams(), true);
    }
  }

  function remapValue(value, start1, end1, start2, end2) {
    const remapped =
      ((value - start1) * (end2 - start2)) / (end1 - start1) + start2;
    return remapped > 0 ? remapped : 0;
  }

  function animate() {
    clearContext();

    for (let i = circles.length - 1; i >= 0; i--) {
      const circle = circles[i];

      const edge = [
        circle.x + circle.translateX - circle.size,
        canvasSize.w - circle.x - circle.translateX - circle.size,
        circle.y + circle.translateY - circle.size,
        canvasSize.h - circle.y - circle.translateY - circle.size,
      ];

      const closestEdge = Math.min(...edge);
      const remapClosestEdge = Math.min(1, remapValue(closestEdge, 0, 20, 0, 1));

      if (remapClosestEdge > 1) {
        circle.alpha += 0.02;
        if (circle.alpha > circle.targetAlpha) {
          circle.alpha = circle.targetAlpha;
        }
      } else {
        circle.alpha = circle.targetAlpha * remapClosestEdge;
      }

      circle.x += circle.dx + config.vx;
      circle.y += circle.dy + config.vy;

      circle.translateX +=
        ((mouse.x / (config.staticity / circle.magnetism)) - circle.translateX) / config.ease;

      circle.translateY +=
        ((mouse.y / (config.staticity / circle.magnetism)) - circle.translateY) / config.ease;

      drawCircle(circle, false);

      if (
        circle.x < -circle.size ||
        circle.x > canvasSize.w + circle.size ||
        circle.y < -circle.size ||
        circle.y > canvasSize.h + circle.size
      ) {
        circles.splice(i, 1);
        circles.push(circleParams());
      }
    }

    animationId = window.requestAnimationFrame(animate);
  }

  function handleMouseMove(event) {
    mouse.x = event.clientX - canvasSize.w / 2;
    mouse.y = event.clientY - canvasSize.h / 2;
  }

  function handleMouseLeave() {
    mouse.x = 0;
    mouse.y = 0;
  }

  window.addEventListener("mousemove", handleMouseMove, { passive: true });
  window.addEventListener("mouseleave", handleMouseLeave, { passive: true });
  window.addEventListener("resize", resizeCanvas);

  resizeCanvas();

  if (animationId) cancelAnimationFrame(animationId);
  animate();
}
    
/**********************
 * Boot
 **********************/
async function boot(){
  loadAll();
  initParticlesBackground();
  await ensureSession();  // nastaví session + spustí startRealtimeQuestions() uvnitř
  renderQr();
  render();
  lucide.createIcons();
}

boot();

  </script>
